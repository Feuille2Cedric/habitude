<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitTracker Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --gray: #8e8e93;
            --green: #34c759;
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .habit-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .habit-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .habit-title { font-size: 18px; font-weight: bold; }
        .habit-desc { color: var(--gray); font-size: 14px; margin-top: 4px; }
        
        /* Grille style HabitKit */
        .grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 4px;
        }
        .dot {
            width: 100%;
            aspect-ratio: 1;
            background: #2c2c2e;
            border-radius: 4px;
        }
        .dot.active { background: var(--green); }

        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--green);
            width: 60px; height: 60px;
            border-radius: 30px;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        input {
            width: 80%;
            padding: 15px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>HabitKit</h1>
    <span id="status" style="font-size: 12px; color: var(--gray);">☁️ Synchro OK</span>
</div>

<div id="app">
    </div>

<button class="add-btn" onclick="createNewHabit()">+</button>

<script>
    // --- CONFIGURATION FIREBASE ---
    // REMPLACE AVEC TES INFOS FIREBASE ICI :
    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        databaseURL: "TON_URL_DATABASE",
        projectId: "TON_PROJECT_ID",
        appId: "TON_APP_ID"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- LOGIQUE ---
    function createNewHabit() {
        const name = prompt("Nom de l'habitude ?");
        if (name) {
            const newHabit = {
                name: name,
                history: new Array(100).fill(false) // 100 jours
            };
            db.ref('habits').push(newHabit);
        }
    }

    function toggleDay(habitId, dayIndex, currentStatus) {
        db.ref(`habits/${habitId}/history/${dayIndex}`).set(!currentStatus);
    }

    // Lecture en temps réel (PC et Mobile se mettent à jour instantanément)
    db.ref('habits').on('value', (snapshot) => {
        const data = snapshot.val();
        const app = document.getElementById('app');
        app.innerHTML = '';
        
        for (let id in data) {
            const habit = data[id];
            const history = habit.history || [];
            
            let gridHtml = '';
            history.forEach((done, index) => {
                gridHtml += `<div class="dot ${done ? 'active' : ''}" onclick="toggleDay('${id}', ${index}, ${done})"></div>`;
            });

            app.innerHTML += `
                <div class="habit-card">
                    <div class="habit-info">
                        <div>
                            <div class="habit-title">${habit.name}</div>
                            <div class="habit-desc">Clique sur un carré pour valider</div>
                        </div>
                        <button onclick="deleteHabit('${id}')" style="background:none; border:none; color:red;">✕</button>
                    </div>
                    <div class="grid">${gridHtml}</div>
                </div>
            `;
        }
    });

    function deleteHabit(id) {
        if(confirm("Supprimer ?")) db.ref(`habits/${id}`).remove();
    }
</script>

</body>
</html>
